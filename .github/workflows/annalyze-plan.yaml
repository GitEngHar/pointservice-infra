name: terraform

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command"
        required: true
        type: choice
        options:
          - plan


permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::363471485358:role/TerraformApply
          aws-region: ap-northeast-1
      - name: Terraform Plan
        if: github.event.inputs.command == 'plan'
        run: terraform init
          terraform plan -out tfplan
          terraform show -json tfplan > plan.json
      - name: summarize terraform plan
        uses: GitEngHar/analyze_plan@v1
        with:
          plan-path: plan.json

env:
  TF_VAR_my_global_ip: ${{ secrets.MY_GLOBAL_IP }}
  TF_VAR_line_auth_client_id: ${{ secrets.LINE_AUTH_CLIENT_ID }}
  TF_VAR_lambda_exec_role_arn: ${{ secrets.LAMBDA_EXEC_ROLE_ARN }}
  TF_VAR_lambda_image_uri: ${{ secrets.LAMBDA_IMAGE_URI }}