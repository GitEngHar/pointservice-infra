name: terraform

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command"
        required: true
        type: choice
        options:
          - init
          - plan
          - apply

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::363471485358:role/TerraformApply
          aws-region: ap-northeast-1
      - name: Terraform Init
        run: terraform init
      - name: Stop if only init requested
        if: github.event.inputs.command == 'init'
        run: echo "Init completed"

      - name: Terraform Plan
        if: github.event.inputs.command == 'plan'
        run: terraform plan

      - name: Terraform Apply
        if: github.event.inputs.command == 'apply'
        run: terraform apply -auto-approve
env:
  TF_VAR_my_global_ip: ${{ secrets.MY_GLOBAL_IP }}
  TF_VAR_line_auth_client_id: ${{ secrets.LINE_AUTH_CLIENT_ID }}
  TF_VAR_lambda_exec_role_arn: ${{ secrets.LAMBDA_EXEC_ROLE_ARN }}
  TF_VAR_lambda_image_uri: ${{ secrets.LAMBDA_IMAGE_URI }}