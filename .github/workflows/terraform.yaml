name: terraform

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command"
        required: true
        type: choice
        options:
          - init
          - plan
          - apply

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::AWS_ACCOUNT_ID:role/github-actions-terraform
          aws-region: ap-northeast-1
      - name: Terraform Init
        run: terraform init
      - name: Stop if only init requested
        if: github.event.inputs.command == 'init'
        run: echo "Init completed"

      - name: Terraform Plan
        if: github.event.inputs.command == 'plan'
        run: terraform plan

      - name: Terraform Apply
        if: github.event.inputs.command == 'apply'
        run: terraform apply -auto-approve